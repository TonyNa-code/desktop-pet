name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run check

      - name: Build
        run: npm run build -- --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-pet-${{ runner.os }}
          path: |
            dist/*.AppImage
            dist/*.dmg
            dist/*.exe
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: Update Latest Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create latest release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          gh release delete latest --repo "$REPOSITORY" --yes --cleanup-tag || true
          gh release create latest release-assets/**/* \
            --repo "$REPOSITORY" \
            --target "$TARGET_SHA" \
            --title "Desktop Pet latest" \
            --notes "Latest Desktop Pet build. Download the file for your operating system, then follow 小白使用说明.md."
